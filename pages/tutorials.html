<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAF — Tutorials</title>
  <link rel="stylesheet" href="../css/styles.css">
  <!-- PWA -->
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#C9561E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MAF">
  <link rel="apple-touch-icon" href="../assets/icons/icon-152.png">
  <style>
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px; margin-top: 12px;
    }
    .topic-card {
      background: var(--surf); border: 1px solid var(--edge);
      border-radius: var(--radius); padding: 14px;
      cursor: pointer; transition: all .15s;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 8px;
    }
    .topic-card:hover { border-color: var(--ora); transform: translateY(-2px); }
    .topic-card.weak { border-color: var(--red); background: rgba(176,48,32,.08); }
    .topic-card.strong { border-color: var(--green); }
    .topic-emoji { font-size: 32px; }
    .topic-name { font-size: 13px; font-weight: 700; color: var(--cream); }
    .topic-acc { font-size: 11px; color: var(--muted); }
    .topic-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 20px;
      font-weight: 700; border: 1px solid;
    }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--edge);
    }
    .history-item:last-child { border-bottom: none; }
    .history-emoji { font-size: 24px; }
    .gen-overlay {
      position: fixed; inset: 0; background: rgba(44,26,14,.92);
      z-index: 200; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .gen-overlay.show { opacity: 1; pointer-events: all; }
    .gen-spinner {
      width: 60px; height: 60px; border-radius: 50%;
      border: 3px solid var(--edge);
      border-top-color: var(--ora);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gen-text { font-size: 16px; color: var(--cream); font-weight: 700; }
    .gen-sub { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
<nav class="topnav" id="topnav"></nav>
<div class="page">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="section-title">📚 Tutorials</div>
    <div class="section-sub">AI-generated lessons personalized to your performance.</div>

    <!-- AI Recommendation -->
    <div class="card mb-12" style="background:linear-gradient(135deg,rgba(201,86,30,.12),rgba(200,130,26,.08));border-color:var(--ora)">
      <div class="row-between">
        <div>
          <div class="card-title">🤖 Recommended for you</div>
          <div class="card-sub" id="aiRec">Analyzing your recent sessions...</div>
        </div>
        <button class="btn btn-primary" id="aiRecBtn" style="white-space:nowrap;flex-shrink:0" disabled>
          Generate lesson →
        </button>
      </div>
    </div>

    <!-- Topic grid -->
    <div class="card-title mt-16">All topics</div>
    <div class="card-sub">Tap any topic to generate a personalized AI lesson</div>
    <div class="topic-grid" id="topicGrid"></div>

    <!-- Recent tutorials -->
    <div id="historySection" style="display:none" class="mt-16">
      <div class="card-title">Recent lessons</div>
      <div class="card" style="margin-top:8px">
        <div id="historyList"></div>
      </div>
    </div>

  </main>
</div>

<!-- Generating overlay -->
<div class="gen-overlay" id="genOverlay">
  <div class="gen-spinner"></div>
  <div class="gen-text" id="genText">Generating your lesson...</div>
  <div class="gen-sub" id="genSub">Claude is analyzing your performance and creating a personalized lesson</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { renderNav } from '../js/nav.js';
import { isFirebaseConfigured } from '../js/firebase-config.js';
import { getSessions } from '../js/firebase-service.js';
import { MockAuth, MockSessions } from '../js/mock-service.js';
import { toast } from '../js/utils.js';

const WORKER_URL = 'https://mafv5.agedotcom.workers.dev/chat';
const useFirebase = isFirebaseConfigured();
const user = useFirebase
  ? JSON.parse(localStorage.getItem('maf_user') || 'null')
  : MockAuth.current();
if (!user) { location.href = '../login.html'; }

await renderNav({ activePage: 'tutorials', showSidebar: true });

const profile = JSON.parse(localStorage.getItem('maf_profile') || '{}');
const childName = profile.username || 'there';

// ── TOPIC DEFINITIONS ─────────────────────────────────────────
const TOPICS = [
  { id: 'add',                emoji: '➕', name: 'Addition',               grade: 1 },
  { id: 'sub',                emoji: '➖', name: 'Subtraction',            grade: 1 },
  { id: 'mul',                emoji: '✖️',  name: 'Multiplication',         grade: 2 },
  { id: 'div',                emoji: '➗', name: 'Division',               grade: 3 },
  { id: 'place_value',        emoji: '🔢', name: 'Place Value',            grade: 2 },
  { id: 'expanded_form',      emoji: '📊', name: 'Expanded Form',          grade: 2 },
  { id: 'word_form',          emoji: '📝', name: 'Word Form',              grade: 3 },
  { id: 'rounding',           emoji: '🎯', name: 'Rounding',               grade: 2 },
  { id: 'number_line',        emoji: '📏', name: 'Number Line',            grade: 2 },
  { id: 'compare',            emoji: '⚖️',  name: 'Compare Numbers',       grade: 2 },
  { id: 'place_relationship', emoji: '🔗', name: 'Place Relationships',    grade: 3 },
  { id: 'fraction',           emoji: '🍕', name: 'Fractions',              grade: 4 },
  { id: 'decimal',            emoji: '💯', name: 'Decimals',               grade: 4 },
  { id: 'percent',            emoji: '📈', name: 'Percentages',            grade: 5 },
  { id: 'geometry',           emoji: '📐', name: 'Geometry',               grade: 6 },
  { id: 'algebra',            emoji: '🔣', name: 'Algebra',                grade: 7 },
  { id: 'time_diff',          emoji: '⏱️',  name: 'Elapsed Time',          grade: 2 },
  { id: 'word',               emoji: '📖', name: 'Word Problems',          grade: 2 },
];

// ── LOAD PERFORMANCE DATA ────────────────────────────────────
const sessions = useFirebase
  ? await getSessions(user.uid, 30).catch(() => [])
  : MockSessions.get(user.uid, 30);

const typeMap = {};
sessions.forEach(s => {
  if (!s.typeStats) return;
  Object.entries(s.typeStats).forEach(([t, st]) => {
    if (!typeMap[t]) typeMap[t] = { correct: 0, total: 0 };
    typeMap[t].correct += st.correct || 0;
    typeMap[t].total   += st.total   || 0;
  });
});

const typeAccuracy = Object.fromEntries(
  Object.entries(typeMap)
    .filter(([, v]) => v.total > 0)
    .map(([t, v]) => [t, Math.round(v.correct / v.total * 100)])
);

// Find weakest topic
const weakest = TOPICS
  .filter(t => typeAccuracy[t.id] !== undefined)
  .sort((a, b) => (typeAccuracy[a.id] || 100) - (typeAccuracy[b.id] || 100))[0];

// ── AI RECOMMENDATION ─────────────────────────────────────────
const recEl  = document.getElementById('aiRec');
const recBtn = document.getElementById('aiRecBtn');

if (weakest) {
  const acc = typeAccuracy[weakest.id];
  recEl.textContent = `Based on your sessions, ${weakest.name} needs the most work (${acc}% accuracy). Generate a personalized lesson now!`;
  recBtn.disabled = false;
  recBtn.onclick = () => generateLesson(weakest.id, weakest.name);
} else if (sessions.length === 0) {
  recEl.textContent = 'Complete some workbook sessions first to get personalized recommendations!';
} else {
  recEl.textContent = 'You\'re doing great across all topics! Pick any topic below to practice.';
  recBtn.disabled = false;
  recBtn.textContent = 'Browse topics ↓';
  recBtn.onclick = () => document.getElementById('topicGrid').scrollIntoView({ behavior: 'smooth' });
}

// ── RENDER TOPIC GRID ─────────────────────────────────────────
const grade = profile.grade || parseInt(localStorage.getItem('maf_setup') ? JSON.parse(localStorage.getItem('maf_setup')).grade : 3);

const grid = document.getElementById('topicGrid');
grid.innerHTML = TOPICS.map(t => {
  const acc = typeAccuracy[t.id];
  const hasData = acc !== undefined;
  const isWeak = hasData && acc < 70;
  const isStrong = hasData && acc >= 85;
  const color = isWeak ? 'var(--red)' : isStrong ? 'var(--green)' : 'var(--amber)';
  const badgeText = hasData ? `${acc}%` : 'New';
  const badgeColor = hasData ? color : 'var(--muted)';
  return `<div class="topic-card ${isWeak?'weak':isStrong?'strong':''}"
    onclick="generateLesson('${t.id}','${t.name}')">
    <div class="topic-emoji">${t.emoji}</div>
    <div class="topic-name">${t.name}</div>
    <span class="topic-badge" style="color:${badgeColor};border-color:${badgeColor}">${badgeText}</span>
  </div>`;
}).join('');

// ── LOAD HISTORY ──────────────────────────────────────────────
const history = JSON.parse(localStorage.getItem(`maf_tutorials_${user.uid}`) || '[]');
if (history.length) {
  document.getElementById('historySection').style.display = '';
  document.getElementById('historyList').innerHTML = history.slice(0, 5).map(h => {
    const topic = TOPICS.find(t => t.id === h.topicId);
    return `<div class="history-item">
      <div class="history-emoji">${topic?.emoji || '📚'}</div>
      <div style="flex:1">
        <div style="font-weight:700;color:var(--cream)">${h.topicName}</div>
        <div class="text-muted text-sm">${new Date(h.at).toLocaleDateString()}</div>
      </div>
      <button class="btn btn-sm" onclick="reviewLesson('${h.id}')">Review →</button>
    </div>`;
  }).join('');
}

// ── GENERATE LESSON ───────────────────────────────────────────
window.generateLesson = async function(topicId, topicName) {
  const overlay = document.getElementById('genOverlay');
  const genText = document.getElementById('genText');
  const genSub  = document.getElementById('genSub');

  overlay.classList.add('show');
  genText.textContent = `Creating your ${topicName} lesson...`;
  genSub.textContent  = 'Claude is analyzing your performance and building a personalized lesson';

  const acc = typeAccuracy[topicId];
  const perfNote = acc !== undefined
    ? `The student has ${acc}% accuracy on ${topicName} across ${typeMap[topicId]?.total || 0} problems.`
    : `This is a new topic for the student.`;

  const prompt = `Create a complete math tutorial lesson on "${topicName}" for a student named ${childName} in grade ${grade || 3}.

${perfNote}

Return a JSON object with this exact structure (no markdown, no backticks, just raw JSON):
{
  "title": "lesson title",
  "emoji": "single emoji",
  "intro": "1-2 sentence friendly intro for a kid",
  "concept": "clear explanation of the concept in simple language (2-3 sentences)",
  "example1": {
    "problem": "first worked example problem",
    "steps": ["step 1", "step 2", "step 3"],
    "answer": "final answer"
  },
  "example2": {
    "problem": "second worked example",
    "steps": ["step 1", "step 2"],
    "answer": "final answer"
  },
  "keyFact": "one important thing to remember (1 sentence)",
  "practice": [
    {"problem": "practice problem 1", "answer": "answer1", "hint": "helpful hint"},
    {"problem": "practice problem 2", "answer": "answer2", "hint": "helpful hint"},
    {"problem": "practice problem 3", "answer": "answer3", "hint": "helpful hint"}
  ],
  "funFact": "an interesting real-world connection to this math topic"
}`;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 1500,
        system: 'You are a math curriculum expert. Always respond with valid JSON only. No markdown, no explanation, just the JSON object.'
      })
    });

    const data  = await res.json();
    const raw   = data.content?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const lesson = JSON.parse(clean);

    // Save to history
    const lessonId = `${topicId}_${Date.now()}`;
    lesson.id = lessonId;
    lesson.topicId = topicId;
    lesson.topicName = topicName;
    lesson.at = Date.now();

    const existing = JSON.parse(localStorage.getItem(`maf_tutorials_${user.uid}`) || '[]');
    existing.unshift(lesson);
    localStorage.setItem(`maf_tutorials_${user.uid}`, JSON.stringify(existing.slice(0, 20)));
    localStorage.setItem(`maf_tutorial_${lessonId}`, JSON.stringify(lesson));

    overlay.classList.remove('show');
    // Navigate to lesson page
    location.href = `tutorial-lesson.html?id=${lessonId}&uid=${user.uid}`;

  } catch(e) {
    overlay.classList.remove('show');
    toast('Failed to generate lesson. Try again!', 'wrong');
    console.error(e);
  }
};

window.reviewLesson = function(id) {
  const uid = user.uid;
  location.href = `tutorial-lesson.html?id=${id}&uid=${uid}`;
};
</script>
</body>
</html>
