# worker/wrangler.toml — Cloudflare Worker configuration
# Deploy with: npx wrangler deploy --config worker/wrangler.toml

name               = "mafv5"
main               = "worker/index.js"
compatibility_date = "2024-01-01"

# ANTHROPIC_API_KEY is NOT stored here.
# Set it once with:
#   npx wrangler secret put ANTHROPIC_API_KEY --config worker/wrangler.toml
# Paste your key when prompted — Cloudflare encrypts and stores it securely.
